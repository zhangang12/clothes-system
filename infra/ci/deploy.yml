# 合并 main → 自动 SSH 上服务器执行 deploy.sh（CLAUDE.md 待办：合并即发版）
#
# ⚠️ 启用方式：把本文件复制为 .github/workflows/deploy.yml 并提交
#（本仓库当前推送用的 PAT 无 workflow scope，无法直接落位；用带 workflow scope 的凭据
#  或在 GitHub 网页端新建该文件即可）
#
# 启用前需在 GitHub 仓库 Settings → Secrets and variables → Actions 配置：
#   DEPLOY_SSH_HOST  服务器 IP/域名
#   DEPLOY_SSH_USER  登录用户（如 root）
#   DEPLOY_SSH_KEY   部署专用私钥（服务器 authorized_keys 放对应公钥；建议单独生成、只授本机）
# 未配置 secrets 时 workflow 会跳过部署步骤（不报红），不影响合并。
name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 手动触发兜底

concurrency:
  group: deploy-production
  cancel-in-progress: false   # 部署不可中断，排队执行

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check secrets configured
        id: check
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 DEPLOY_SSH_HOST 等 secrets，跳过自动部署（配置后合并即发版）"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH key
        if: steps.check.outputs.configured == 'true'
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy.sh on server
        if: steps.check.outputs.configured == 'true'
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          USER: ${{ secrets.DEPLOY_SSH_USER }}
        # deploy.sh 内置：拉 main → 构建四包 → 升级前整库备份 + 幂等结构升级 + 校验
        # → 重启 i9-api → 健康检查 + 残留报错自检 → reload nginx；任一步失败打印回滚命令
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=15 "$USER@$HOST" \
            'cd /opt/i9/clothes-system && bash infra/scripts/deploy.sh' 2>&1

      - name: Post-deploy health check
        if: steps.check.outputs.configured == 'true'
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$USER@$HOST" \
            'cd /opt/i9/clothes-system && bash infra/scripts/health.sh'
