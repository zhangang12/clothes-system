version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: i9_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-i9root123}
      MYSQL_DATABASE: i9_clothes
      MYSQL_USER: ${MYSQL_USER:-i9user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-i9pass123}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD:-i9root123}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: i9_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-i9redis123} --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-i9redis123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
